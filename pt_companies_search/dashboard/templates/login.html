<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PT Companies</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white h-screen flex items-center justify-center font-sans">
    <div class="bg-gray-800 p-10 rounded-xl shadow-2xl w-full max-w-md border border-gray-700">
        <div class="text-center mb-8">
            <h1 class="text-6xl mb-4">🇵🇹</h1>
            <h2 class="text-2xl font-extrabold text-gray-100">Welcome Back</h2>
            <p class="text-gray-400 mt-2 text-sm">Access the PT Companies Dashboard</p>
        </div>
        
        {% if error %}
        <div class="bg-red-500/20 border border-red-500 text-red-300 p-3 rounded mb-6 text-center text-sm">
            {{ error }}
        </div>
        {% endif %}
        
        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label for="token" class="block text-sm font-medium text-gray-400 mb-2">Access Token</label>
                <input type="password" id="token" name="token" placeholder="Enter your token..." required 
                       class="w-full px-4 py-3 bg-gray-900 border border-gray-700 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all text-white placeholder-gray-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded-lg shadow-lg hover:shadow-xl transition-all duration-200">
                Sign In
            </button>
        </form>
        <div class="mt-8 text-center">
            <p class="text-xs text-gray-500">Secured with FastAPI & JWT Cookies</p>
        </div>
    </div>
</body>
</html>
