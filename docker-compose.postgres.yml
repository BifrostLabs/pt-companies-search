services:
  postgres:
    image: postgres:16-alpine
    container_name: pt-companies-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pt_companies
      POSTGRES_USER: pt_user
      POSTGRES_PASSWORD: pt_secure_pass_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pt_user -d pt_companies"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
