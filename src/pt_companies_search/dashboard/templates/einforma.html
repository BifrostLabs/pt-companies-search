<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eInforma Data | PT Companies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-[#0b0f1a] text-gray-100 min-h-screen">
    <div class="flex flex-col md:flex-row min-h-screen">
        <aside class="w-full md:w-64 bg-gray-900 border-r border-gray-800 flex-shrink-0">
            <div class="p-6">
                <div class="flex items-center space-x-3 mb-10">
                    <span class="text-3xl">🇵🇹</span>
                    <span class="text-xl font-black tracking-tight text-white"><span class="text-blue-500">CORP</span></span>
                </div>
                
                <nav class="space-y-2">
                    <a href="/" class="flex items-center space-x-3 p-3 rounded-xl transition-all {% if active_page == 'dashboard' %}bg-blue-600/10 text-blue-400 border border-blue-600/20{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                        <span class="font-semibold">Dashboard</span>
                    </a>
                    <a href="/einforma" class="flex items-center space-x-3 p-3 rounded-xl transition-all {% if active_page == 'einforma' %}bg-blue-600/10 text-blue-400 border border-blue-600/20{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <span class="font-semibold">eInforma</span>
                    </a>
                    <a href="/nif" class="flex items-center space-x-3 p-3 rounded-xl transition-all {% if active_page == 'nif' %}bg-blue-600/10 text-blue-400 border border-blue-600/20{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        <span class="font-semibold">NIF.pt</span>
                    </a>
                    <a href="/leads" class="flex items-center space-x-3 p-3 rounded-xl transition-all {% if active_page == 'leads' %}bg-green-600/10 text-green-400 border border-green-600/20{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        <span class="font-semibold">Leads</span>
                    </a>
                </nav>
            </div>
            <div class="mt-auto p-6">
                <a href="/logout" class="flex items-center space-x-3 p-3 rounded-xl text-red-400 hover:bg-red-500/10 transition-all border border-transparent hover:border-red-500/20">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                    <span class="font-semibold">Sign Out</span>
                </a>
            </div>
        </aside>

        <main class="flex-1 p-4 md:p-8 lg:p-12 overflow-y-auto">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
                <div>
                    <h1 class="text-4xl font-black text-white tracking-tight mb-2">eInforma Directory</h1>
                    <p class="text-gray-400 font-medium">Newly registered companies — raw scrape from eInforma.pt</p>
                </div>
                <div id="rowCount" class="text-xs text-gray-500 font-semibold uppercase tracking-widest"></div>
            </header>

            <!-- Search + sector filter -->
            <div class="flex flex-col sm:flex-row gap-3 mb-6">
                <input id="searchInput" type="text" placeholder="Search by name or NIF..."
                    class="flex-1 bg-gray-900 border border-gray-700 text-white rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500"
                    oninput="filterRows()" />
                <select id="sectorFilter" onchange="filterRows()"
                    class="bg-gray-900 border border-gray-700 text-white rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500">
                    <option value="">All sectors</option>
                </select>
                <select id="dateFilter" onchange="filterRows()"
                    class="bg-gray-900 border border-gray-700 text-white rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500">
                    <option value="">All dates</option>
                </select>
            </div>

            <div class="bg-gray-900 rounded-3xl border border-gray-800 shadow-sm overflow-hidden flex flex-col h-[70vh]">
                <div class="overflow-y-auto flex-1">
                    <table class="w-full text-left border-collapse">
                        <thead class="bg-gray-950/80 text-xs uppercase tracking-widest text-gray-500 sticky top-0 backdrop-blur-sm z-10">
                            <tr>
                                <th class="py-5 px-6 font-bold">NIF</th>
                                <th class="py-5 px-6 font-bold">Company Name</th>
                                <th class="py-5 px-6 font-bold">Sector</th>
                                <th class="py-5 px-6 font-bold">Registration Date</th>
                                <th class="py-5 px-6 font-bold">City</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-800 text-sm" id="dataTable">
                            <tr><td colspan="5" class="py-12 text-center text-gray-500 font-medium">Fetching live data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        let _allRows = [];

        const SECTOR_COLORS = {
            'Construção': 'bg-orange-500/10 text-orange-400',
            'Tecnologia': 'bg-blue-500/10 text-blue-400',
            'Alimentação': 'bg-yellow-500/10 text-yellow-400',
            'Consultoria': 'bg-purple-500/10 text-purple-400',
            'Imobiliário': 'bg-green-500/10 text-green-400',
            'Turismo':     'bg-cyan-500/10 text-cyan-400',
            'Saúde':       'bg-red-500/10 text-red-400',
            'Educação':    'bg-pink-500/10 text-pink-400',
            'Beleza':      'bg-rose-500/10 text-rose-400',
            'Transporte':  'bg-indigo-500/10 text-indigo-400',
            'Comércio':    'bg-teal-500/10 text-teal-400',
        };

        function renderRows(rows) {
            const tbody = document.getElementById('dataTable');
            document.getElementById('rowCount').textContent = rows.length + ' companies';
            if (!rows.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="py-12 text-center text-gray-500">No results.</td></tr>';
                return;
            }
            tbody.innerHTML = rows.map(r => {
                const nif = r.nif || '';
                const nifLink = nif ? `https://www.nif.pt/${nif}/` : '#';
                const regDate = r.registration_date || '';
                const sector = r.sector && r.sector !== 'Outro' ? r.sector : '';
                const sectorHtml = sector
                    ? `<span class="text-xs px-2 py-0.5 rounded ${SECTOR_COLORS[sector] || 'bg-gray-700/50 text-gray-400'}">${sector}</span>`
                    : '<span class="text-gray-600 text-xs">—</span>';
                return `
                <tr class="hover:bg-gray-800/40 transition-colors">
                    <td class="py-3 px-6 font-mono text-blue-400 text-xs">
                        <a href="${nifLink}" target="_blank" class="hover:underline">${nif}</a>
                    </td>
                    <td class="py-3 px-6 text-white font-semibold">${r.name || '—'}</td>
                    <td class="py-3 px-6">${sectorHtml}</td>
                    <td class="py-3 px-6 text-gray-400 text-xs font-mono">${regDate}</td>
                    <td class="py-3 px-6 text-gray-400 text-xs">${r.city || '—'}</td>
                </tr>`;
            }).join('');
        }

        function filterRows() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            const sector = document.getElementById('sectorFilter').value;
            const date = document.getElementById('dateFilter').value;
            const filtered = _allRows.filter(r =>
                (!q || (r.name||'').toLowerCase().includes(q) || (r.nif||'').includes(q)) &&
                (!sector || r.sector === sector) &&
                (!date || r.registration_date === date)
            );
            renderRows(filtered);
        }

        fetch('/api/einforma')
            .then(r => { if(r.status===401){ location.href='/login'; } return r.json(); })
            .then(data => {
                _allRows = data || [];

                // Populate sector filter
                const sectors = [...new Set(_allRows.map(r=>r.sector).filter(s=>s&&s!=='Outro'))].sort();
                const sf = document.getElementById('sectorFilter');
                sectors.forEach(s => { const o=document.createElement('option'); o.value=s; o.textContent=s; sf.appendChild(o); });

                // Populate date filter
                const dates = [...new Set(_allRows.map(r=>r.registration_date).filter(Boolean))].sort().reverse();
                const df = document.getElementById('dateFilter');
                dates.forEach(d => { const o=document.createElement('option'); o.value=d; o.textContent=d; df.appendChild(o); });

                renderRows(_allRows);
            })
            .catch(err => {
                console.error('Error:', err);
                document.getElementById('dataTable').innerHTML =
                    '<tr><td colspan="5" class="py-12 text-center text-red-400">Error loading data.</td></tr>';
            });
    </script>
</body>
</html>
