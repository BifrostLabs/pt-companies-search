name: Scheduled Jobs

on:
  schedule:
    # Run scraper every 6 hours
    - cron: '0 */6 * * *'
    # Run enricher daily at 2 AM UTC
    - cron: '0 2 * * *'
    # Run searcher every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        default: 'scrape'
        type: choice
        options:
          - scrape
          - enrich
          - search

jobs:
  scrape:
    if: github.event_name == 'schedule' && github.event.schedule == '0 */6 * * *' || github.event.inputs.job == 'scrape'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run scraper
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python scraper.py

  enrich:
    if: github.event_name == 'schedule' && github.event.schedule == '0 2 * * *' || github.event.inputs.job == 'enrich'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run enricher
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          NIF_API_KEY: ${{ secrets.NIF_API_KEY }}
        run: python nif_enrich.py --source historical

  search:
    if: github.event_name == 'schedule' && github.event.schedule == '0 */12 * * *' || github.event.inputs.job == 'search'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run searcher
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: python nif_search.py "TECNOLOGIA SOFTWARE CONSULTORIA CONSTRUCAO" --pages 10
