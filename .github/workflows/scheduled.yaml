# Fallback manual triggers — production scheduling is handled by k8s CronJobs in Helm.
# Use workflow_dispatch to trigger a one-off run from GitHub UI or API.

name: Scheduled Jobs

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: true
        default: 'scrape'
        type: choice
        options:
          - scrape
          - enrich
          - search

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install package
        run: pip install --no-cache-dir .

      - name: Run scraper
        if: inputs.job == 'scrape'
        env:
          DB_HOST:     ${{ secrets.DB_HOST }}
          DB_PORT:     ${{ secrets.DB_PORT }}
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_USER:     ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: pt-search scrape --pages 10

      - name: Run enricher
        if: inputs.job == 'enrich'
        env:
          DB_HOST:       ${{ secrets.DB_HOST }}
          DB_PORT:       ${{ secrets.DB_PORT }}
          DB_NAME:       ${{ secrets.DB_NAME }}
          DB_USER:       ${{ secrets.DB_USER }}
          DB_PASSWORD:   ${{ secrets.DB_PASSWORD }}
          NIF_API_KEY:   ${{ secrets.NIF_API_KEY }}
          NIF_API_KEY_2: ${{ secrets.NIF_API_KEY_2 }}
          NIF_API_KEY_3: ${{ secrets.NIF_API_KEY_3 }}
        run: pt-search enrich --limit 100

      - name: Run searcher
        if: inputs.job == 'search'
        env:
          DB_HOST:     ${{ secrets.DB_HOST }}
          DB_PORT:     ${{ secrets.DB_PORT }}
          DB_NAME:     ${{ secrets.DB_NAME }}
          DB_USER:     ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          pt-search search "TECNOLOGIA" --pages 5
          pt-search search "CONSULTORIA" --pages 5
          pt-search search "CONSTRUCAO"  --pages 5
