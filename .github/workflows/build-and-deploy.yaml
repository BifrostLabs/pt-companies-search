name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'data/**'
      - '.streamlit/**'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}
  HELM_CHARTS_REPO: BifrostLabs/helm-charts

jobs:
  # Detect changes and determine what to build
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      scraper: ${{ steps.filter.outputs.scraper }}
      enricher: ${{ steps.filter.outputs.enricher }}
      searcher: ${{ steps.filter.outputs.searcher }}
      any-python: ${{ steps.filter.outputs.any-python }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dashboard:
              - 'app.py'
              - 'pages/**'
              - 'dashboard.py'
              - 'db_loader.py'
              - 'db.py'
              - 'requirements.txt'
              - 'docker/Dockerfile.dashboard'
            scraper:
              - 'scraper.py'
              - 'db.py'
              - 'db_loader.py'
              - 'requirements.txt'
              - 'docker/Dockerfile.scraper'
            enricher:
              - 'nif_enrich.py'
              - 'enrich_api.py'
              - 'db.py'
              - 'db_loader.py'
              - 'requirements.txt'
              - 'docker/Dockerfile.enricher'
            searcher:
              - 'nif_search.py'
              - 'db.py'
              - 'db_loader.py'
              - 'requirements.txt'
              - 'docker/Dockerfile.searcher'
            any-python:
              - '**.py'
              - 'requirements.txt'
              - 'docker/**'

  # Build Docker images
  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.any-python == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component:
          - name: dashboard
            dockerfile: Dockerfile.dashboard
          - name: scraper
            dockerfile: Dockerfile.scraper
          - name: enricher
            dockerfile: Dockerfile.enricher
          - name: searcher
            dockerfile: Dockerfile.searcher
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/pt-companies-${{ matrix.component.name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/${{ matrix.component.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Update Helm chart values and trigger ArgoCD sync
  deploy:
    needs: [detect-changes, build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout Helm Charts
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_CHARTS_REPO }}
          ssh-key: ${{ secrets.HELM_CHARTS_DEPLOY_KEY }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update image tags
        env:
          SHA: ${{ github.sha }}
        run: |
          # Update values with new image tag
          cat > charts/pt-companies/values-image.yaml << EOF
          # Auto-generated by GitHub Actions
          # Commit: ${SHA}
          # Date: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          dashboard:
            image:
              tag: "${SHA}"
          
          scraper:
            image:
              tag: "${SHA}"
          
          enricher:
            image:
              tag: "${SHA}"
          
          searcher:
            image:
              tag: "${SHA}"
          EOF

      - name: Commit and push
        run: |
          git add charts/pt-companies/values-image.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update pt-companies image tags to ${SHA}"
            git push
          fi

      - name: Trigger ArgoCD sync
        if: success()
        run: |
          # ArgoCD will auto-sync when it detects the new commit
          # This is optional - only needed if you want immediate sync
          echo "ArgoCD will auto-sync from the new commit"

  # Create GitHub release on tag
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          body: |
            ## PT Companies Release ${{ steps.version.outputs.VERSION }}
            
            ### Docker Images
            - `ghcr.io/${{ env.IMAGE_PREFIX }}/pt-companies-dashboard:${{ steps.version.outputs.VERSION }}`
            - `ghcr.io/${{ env.IMAGE_PREFIX }}/pt-companies-scraper:${{ steps.version.outputs.VERSION }}`
            - `ghcr.io/${{ env.IMAGE_PREFIX }}/pt-companies-enricher:${{ steps.version.outputs.VERSION }}`
            - `ghcr.io/${{ env.IMAGE_PREFIX }}/pt-companies-searcher:${{ steps.version.outputs.VERSION }}`
