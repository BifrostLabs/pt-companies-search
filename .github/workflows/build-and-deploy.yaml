name: Build and Deploy

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'data/**'
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Build all images even if unchanged'
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  ORG: bifrostlabs
  HELM_CHARTS_REPO: BifrostLabs/helm-charts

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      dashboard: ${{ steps.filter.outputs.dashboard }}
      scraper:   ${{ steps.filter.outputs.scraper }}
      enricher:  ${{ steps.filter.outputs.enricher }}
      searcher:  ${{ steps.filter.outputs.searcher }}
      any:       ${{ steps.filter.outputs.any }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dashboard:
              - 'pt_companies_search/dashboard/**'
              - 'pt_companies_search/core/**'
              - 'pt_companies_search/utils/**'
              - 'pyproject.toml'
              - 'docker/Dockerfile.dashboard'
            scraper:
              - 'pt_companies_search/scraper/einforma.py'
              - 'pt_companies_search/core/**'
              - 'pt_companies_search/utils/**'
              - 'pyproject.toml'
              - 'docker/Dockerfile.scraper'
            enricher:
              - 'pt_companies_search/enricher/**'
              - 'pt_companies_search/core/**'
              - 'pt_companies_search/utils/**'
              - 'pyproject.toml'
              - 'docker/Dockerfile.enricher'
            searcher:
              - 'pt_companies_search/scraper/nif.py'
              - 'pt_companies_search/core/**'
              - 'pt_companies_search/utils/**'
              - 'pyproject.toml'
              - 'docker/Dockerfile.searcher'
            any:
              - '**.py'
              - 'pyproject.toml'
              - 'docker/**'

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.any == 'true' || inputs.force_all
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: dashboard
            changed: ${{ needs.detect-changes.outputs.dashboard }}
          - component: scraper
            changed: ${{ needs.detect-changes.outputs.scraper }}
          - component: enricher
            changed: ${{ needs.detect-changes.outputs.enricher }}
          - component: searcher
            changed: ${{ needs.detect-changes.outputs.searcher }}
    steps:
      - name: Skip unchanged
        if: matrix.changed != 'true' && !inputs.force_all
        run: echo "No changes for ${{ matrix.component }}, skipping."

      - uses: actions/checkout@v4
        if: matrix.changed == 'true' || inputs.force_all

      - name: Set up Docker Buildx
        if: matrix.changed == 'true' || inputs.force_all
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: matrix.changed == 'true' || inputs.force_all
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push ${{ matrix.component }}
        if: matrix.changed == 'true' || inputs.force_all
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.${{ matrix.component }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.ORG }}/pt-companies-${{ matrix.component }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.ORG }}/pt-companies-${{ matrix.component }}:latest
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  sync-helm:
    needs: build
    if: always() && needs.build.result != 'failure' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout helm-charts
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_CHARTS_REPO }}
          token: ${{ secrets.CR_PAT }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update values-image.yaml
        env:
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          cat > charts/pt-companies/values-image.yaml << EOF
          # Auto-generated by GitHub Actions — do not edit manually
          # Source commit: ${SHA}
          # Built: $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # Run: ${RUN_URL}

          dashboard:
            image:
              tag: "${SHA}"

          scraper:
            image:
              tag: "${SHA}"

          enricher:
            image:
              tag: "${SHA}"

          searcher:
            image:
              tag: "${SHA}"
          EOF

      - name: Commit and push
        run: |
          git add charts/pt-companies/values-image.yaml
          if git diff --staged --quiet; then
            echo "No changes to values-image.yaml, skipping commit."
          else
            git commit -m "chore(pt-companies): bump image tags to ${GITHUB_SHA::8}"
            git push
          fi
